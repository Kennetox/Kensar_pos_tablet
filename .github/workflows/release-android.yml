name: Build and Release Metrik POS Mobile (Android)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Decode Android release keystore
        run: |
          echo "${{ secrets.METRIK_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build signed release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PMETRIK_UPLOAD_STORE_FILE=upload-keystore.jks \
            -PMETRIK_UPLOAD_STORE_PASSWORD=${{ secrets.METRIK_UPLOAD_STORE_PASSWORD }} \
            -PMETRIK_UPLOAD_KEY_ALIAS=${{ secrets.METRIK_UPLOAD_KEY_ALIAS }} \
            -PMETRIK_UPLOAD_KEY_PASSWORD=${{ secrets.METRIK_UPLOAD_KEY_PASSWORD }}

      - name: Prepare release asset
        run: |
          mkdir -p release-assets
          SOURCE_APK="$(ls android/app/build/outputs/apk/release/*.apk | head -n1)"
          cp "$SOURCE_APK" release-assets/MetrikPOSMobile.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrik-pos-mobile-apk
          path: release-assets/MetrikPOSMobile.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/MetrikPOSMobile.apk
