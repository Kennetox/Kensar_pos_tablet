name: Build and Release Metrik POS Mobile (Android)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Decode and validate Android release keystore
        env:
          METRIK_UPLOAD_KEYSTORE_BASE64: ${{ secrets.METRIK_UPLOAD_KEYSTORE_BASE64 }}
          METRIK_UPLOAD_STORE_PASSWORD: ${{ secrets.METRIK_UPLOAD_STORE_PASSWORD }}
          METRIK_UPLOAD_KEY_ALIAS: ${{ secrets.METRIK_UPLOAD_KEY_ALIAS }}
        run: |
          python - <<'PY'
          import base64
          import os
          import re
          from pathlib import Path

          encoded = os.environ.get("METRIK_UPLOAD_KEYSTORE_BASE64", "")
          cleaned = re.sub(r"\s+", "", encoded)
          if not cleaned:
              raise SystemExit("METRIK_UPLOAD_KEYSTORE_BASE64 is empty.")

          decoded = base64.b64decode(cleaned, validate=True)
          out_path = Path("android/app/upload-keystore.jks")
          out_path.write_bytes(decoded)
          print(f"Keystore decoded: {out_path} ({out_path.stat().st_size} bytes)")
          PY

          keytool -list \
            -keystore android/app/upload-keystore.jks \
            -storepass "${METRIK_UPLOAD_STORE_PASSWORD}" \
            -alias "${METRIK_UPLOAD_KEY_ALIAS}" >/dev/null

      - name: Build signed release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PMETRIK_UPLOAD_STORE_FILE=upload-keystore.jks \
            -PMETRIK_UPLOAD_STORE_PASSWORD=${{ secrets.METRIK_UPLOAD_STORE_PASSWORD }} \
            -PMETRIK_UPLOAD_KEY_ALIAS=${{ secrets.METRIK_UPLOAD_KEY_ALIAS }} \
            -PMETRIK_UPLOAD_KEY_PASSWORD=${{ secrets.METRIK_UPLOAD_KEY_PASSWORD }}

      - name: Prepare release asset
        run: |
          mkdir -p release-assets
          SOURCE_APK="$(ls android/app/build/outputs/apk/release/*.apk | head -n1)"
          cp "$SOURCE_APK" release-assets/MetrikPOSMobile.apk

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=Metrik POS Mobile ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "name=Metrik POS Mobile (Latest)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrik-pos-mobile-apk
          path: release-assets/MetrikPOSMobile.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          make_latest: true
          overwrite_files: true
          files: release-assets/MetrikPOSMobile.apk
